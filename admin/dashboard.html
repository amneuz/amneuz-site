<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMNEUZ Admin Dashboard</title>
  <style>
    :root{--bg:#050505;--text:#f4f4f4;--muted:#9b9b9b;--line:rgba(255,255,255,.14);--soft:rgba(255,255,255,.04)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;padding:32px}
    header{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:32px}
    .brand{font-weight:700;letter-spacing:.34em}
    .panel{border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.04);padding:24px}
    h1{font-size:2rem;margin-bottom:10px}
    p{color:var(--muted);line-height:1.5}
    button{border:1px solid rgba(255,255,255,.22);border-radius:999px;background:transparent;color:var(--text);padding:10px 14px 8px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}
    .status{margin-top:18px;color:#9fe6b8;font-size:.9rem}
    .substatus{margin-top:8px;color:var(--muted);font-size:.86rem}
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./dashboard.js"></script>
</head>
<body>
  <header>
    <div class="brand">AMNEUZ</div>
    <button id="logoutBtn">Log out</button>
  </header>

  <main class="panel">
    <h1 id="greetingTitle">Admin Dashboard</h1>
    <p>Private control center for managing AMNEUZ releases.</p>
    <div id="status" class="status"></div>
    <div id="substatus" class="substatus"></div>
  </main>
</body>
</html>
