<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMNEUZ Admin Dashboard</title>
  <style>
    :root{
      --bg:#050505;
      --text:#f4f4f4;
      --muted:#9b9b9b;
      --line:rgba(255,255,255,.14);
      --soft:rgba(255,255,255,.04);
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      padding:32px;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      margin-bottom:32px;
    }

    .brand{
      font-weight:700;
      letter-spacing:.22em;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:24px;
      background:rgba(255,255,255,.04);
      padding:24px;
    }

    h1{
      font-size:2rem;
      margin-bottom:10px;
    }

    p{
      color:var(--muted);
      line-height:1.5;
    }

    button{
      border:1px solid rgba(255,255,255,.22);
      border-radius:999px;
      background:transparent;
      color:var(--text);
      padding:10px 14px 8px;
      font-size:.7rem;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      cursor:pointer;
    }

    button:hover{
      background:rgba(255,255,255,.08);
    }

    button:disabled{
      opacity:.55;
      cursor:wait;
    }

    .status{
      margin-top:18px;
      color:#9fe6b8;
      font-size:.9rem;
    }

    .substatus{
      margin-top:8px;
      color:var(--muted);
      font-size:.86rem;
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      z-index:50;
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:rgba(0,0,0,.78);
      backdrop-filter:blur(16px);
    }

    .modal-backdrop.show{
      display:flex;
    }

    .modal-card{
      width:min(100%,920px);
      max-height:88vh;
      overflow:auto;
      border:1px solid rgba(255,255,255,.16);
      border-radius:28px;
      background:#0a0a0a;
      box-shadow:0 28px 90px rgba(0,0,0,.62);
    }

    .modal-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      padding:24px;
      border-bottom:1px solid rgba(255,255,255,.1);
    }

    .modal-eyebrow{
      margin:0 0 8px;
      color:rgba(255,255,255,.48);
      font-size:.7rem;
      letter-spacing:.22em;
      text-transform:uppercase;
    }

    .modal-title{
      margin:0;
      font-size:1.7rem;
      letter-spacing:-.03em;
    }

    .modal-body{
      padding:24px;
    }

    .track-detail-grid{
      display:grid;
      grid-template-columns:180px 1fr;
      gap:24px;
    }

    .track-detail-cover{
      width:180px;
      height:180px;
      border-radius:24px;
      object-fit:cover;
      background:rgba(255,255,255,.08);
    }

    .track-detail-fields{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }

    .detail-field{
      border:1px solid rgba(255,255,255,.1);
      border-radius:16px;
      padding:14px;
      background:rgba(255,255,255,.035);
    }

    .detail-field.full{
      grid-column:1 / -1;
    }

    .detail-label{
      margin:0 0 6px;
      color:rgba(255,255,255,.44);
      font-size:.68rem;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .detail-value{
      margin:0;
      color:#fff;
      font-size:.95rem;
      word-break:break-word;
    }

    .admin-edit-input,
    .admin-edit-textarea{
      width:100%;
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;
      background:rgba(255,255,255,.045);
      color:#fff;
      padding:13px 14px;
      font:inherit;
      outline:none;
    }

    .admin-edit-input:focus,
    .admin-edit-textarea:focus{
      border-color:rgba(92,121,255,.55);
      box-shadow:0 0 0 3px rgba(92,121,255,.12);
    }

    .admin-edit-textarea{
      min-height:90px;
      resize:vertical;
    }

    .modal-footer{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:12px;
      padding:20px 24px 24px;
      border-top:1px solid rgba(255,255,255,.1);
    }

    .modal-save-status{
      margin-right:auto;
      color:rgba(255,255,255,.58);
      font-size:.86rem;
      line-height:1.4;
    }

    .modal-save-status.ok{
      color:#9fe6b8;
    }

    .modal-save-status.error{
      color:#ff9f9f;
    }

    .modal-save-btn{
      background:#f4f4f4;
      color:#050505;
    }

    .modal-note{
      margin-top:18px;
      padding:14px;
      border:1px solid rgba(92,121,255,.24);
      border-radius:16px;
      background:rgba(49,69,180,.08);
      color:rgba(226,232,255,.76);
      font-size:.9rem;
    }

    @media(max-width:760px){
      body{
        padding:22px;
      }

      .track-detail-grid{
        grid-template-columns:1fr;
      }

      .track-detail-cover{
        width:100%;
        height:auto;
        aspect-ratio:1;
      }

      .track-detail-fields{
        grid-template-columns:1fr;
      }

      .modal-header{
        align-items:stretch;
        flex-direction:column;
      }

      .modal-footer{
        flex-direction:column;
        align-items:stretch;
      }

      .modal-save-status{
        margin-right:0;
      }

      .modal-footer button{
        width:100%;
      }
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./dashboard.js"></script>
</head>
<body>
  <header>
    <div class="brand">AMNEUZ</div>
    <button id="logoutBtn">Log out</button>
  </header>

  <main class="panel">
    <h1 id="greetingTitle">Admin Dashboard</h1>
    <p>Private control center for managing AMNEUZ releases.</p>
    <div id="status" class="status"></div>
    <div id="substatus" class="substatus"></div>
  </main>

  <div class="modal-backdrop" id="trackModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="trackModalTitle">
      <div class="modal-header">
        <div>
          <p class="modal-eyebrow">Track Editor</p>
          <h2 class="modal-title" id="trackModalTitle">Loading track...</h2>
        </div>
        <button id="closeTrackModal" type="button">Close</button>
      </div>

      <div class="modal-body" id="trackModalBody">
        <p>Loading...</p>
      </div>

      <div class="modal-footer">
        <span id="trackSaveStatus" class="modal-save-status"></span>
        <button id="saveTrackModalFooter" class="modal-save-btn" type="button">Save Changes</button>
      </div>
    </div>
  </div>
</body>
</html>
