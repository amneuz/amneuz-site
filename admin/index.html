<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMNEUZ Admin</title>
  <style>
    :root{--bg:#050505;--text:#f4f4f4;--muted:#9b9b9b;--line:rgba(255,255,255,.14);--soft:rgba(255,255,255,.04)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;display:grid;place-items:center;padding:24px}
    .card{width:min(100%,420px);border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.04);padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
    .brand{font-size:1.1rem;font-weight:700;letter-spacing:.34em;margin-bottom:28px}
    h1{font-size:1.8rem;line-height:1.05;margin-bottom:10px}
    p{color:var(--muted);font-size:.92rem;line-height:1.55;margin-bottom:22px}
    form{display:grid;gap:14px}
    label{display:grid;gap:8px;color:rgba(244,244,244,.78);font-size:.8rem;letter-spacing:.08em;text-transform:uppercase}
    input{width:100%;border:1px solid var(--line);border-radius:14px;background:rgba(0,0,0,.38);color:var(--text);padding:13px 14px;font-size:1rem;outline:none}
    input:focus{border-color:rgba(120,160,255,.55);box-shadow:0 0 0 3px rgba(120,160,255,.12)}
    button{border:1px solid rgba(255,255,255,.28);border-radius:999px;background:rgba(255,255,255,.92);color:#050505;padding:13px 16px 11px;font-size:.72rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;cursor:pointer}
    button:disabled{opacity:.55;cursor:wait}
    .status{min-height:22px;margin-top:16px;color:var(--muted);font-size:.86rem;line-height:1.45}
    .status.ok{color:#9fe6b8}
    .status.error{color:#ff9b9b}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">AMNEUZ</div>
    <h1>Admin</h1>
    <p>Private access for managing AMNEUZ releases.</p>

    <form id="loginForm">
      <label>
        Email
        <input id="email" type="email" autocomplete="email" required>
      </label>

      <label>
        Password
        <input id="password" type="password" autocomplete="current-password" required>
      </label>

      <button id="loginBtn" type="submit">Log in</button>
    </form>

    <div id="status" class="status"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./admin.js"></script>
</body>
</html>
